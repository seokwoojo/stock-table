<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 대시보드 v02</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="logo-group">
      <h1>📊 투자 대시보드 <span style="font-size:14px;letter-spacing:2px;color:var(--accent2);">v02</span></h1>
      <span>Investment Portfolio Tracker</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <div class="header-date" style="margin-right:8px;">
        <strong id="today-date"></strong>
        <span id="today-time"></span>
      </div>
      <!-- 주가 API 설정 -->
      <button class="btn btn-ghost" style="font-size:10px;padding:6px 10px;white-space:nowrap;" onclick="refreshAllPrices()">🔄 시세갱신</button>
      <button class="btn btn-ghost" onclick="exportJSON()">📥 내보내기</button>
      <button class="btn btn-ghost" onclick="importJSON()">📤 불러오기</button>
      <button class="btn btn-primary" onclick="saveToStorage()">💾 저장</button>
      <button class="btn btn-danger" style="border:1px solid var(--border);padding:8px 12px;" onclick="clearAll()">🗑️</button>
    </div>
  </header>

  <!-- ─── SECTION 1: 기본 정보 ─── -->
  <div class="section-title">기본 정보</div>
  <div class="input-row">
    <div class="input-group">
      <label>월 급여 (세후)</label>
      <input type="number" id="salary" placeholder="3,500,000" oninput="recalcAll()">
    </div>
    <div class="input-group">
      <label>기준 연도/월</label>
      <input type="month" id="baseMonth" oninput="recalcAll()">
    </div>
  </div>

  <!-- ─── SUMMARY CARDS ─── -->
  <div class="section-title">핵심 요약</div>
  <div class="grid-4" style="margin-bottom:32px;">
    <div class="card">
      <div class="card-label">월 급여</div>
      <div class="card-value neutral" id="s-salary">—</div>
    </div>
    <div class="card">
      <div class="card-label">월 총 저축액</div>
      <div class="card-value" id="s-monthSave">—</div>
      <div class="progress-bar"><div class="progress-fill" id="s-saveProg" style="width:0%"></div></div>
      <div class="card-sub" id="s-saveRate">저축률 —</div>
    </div>
    <div class="card">
      <div class="card-label">현재 총 자산 <span style="font-size:9px;color:var(--text3);">(계좌 합산)</span></div>
      <div class="card-value neutral" id="s-asset">—</div>
      <div class="card-sub" id="s-assetSub"></div>
    </div>
    <div class="card">
      <div class="card-label">총 수익 <span style="font-size:9px;opacity:0.7;">(주가+배당)</span></div>
      <div class="card-value" id="s-profit">—</div>
      <div class="card-sub" id="s-profitRate">총 — | 주가 —</div>
    </div>
  </div>

  <!-- ─── SECTION 2: 저축 계좌 현황 ─── -->
  <div class="section-title">계좌별 월 저축 현황</div>
  <div id="savings-grid" class="grid-3" style="margin-bottom:8px;"></div>
  <!-- TOTAL -->
  <div class="total-bar">
    <div>
      <div class="tbl">월 총 저축액 합계</div>
      <div class="tbv" id="tb-monthTotal">₩0</div>
    </div>
    <div>
      <div class="tbl">연간 예상 저축</div>
      <div class="tbv" id="tb-yearTotal">₩0</div>
    </div>
    <div>
      <div class="tbl">저축률</div>
      <div class="tbv" id="tb-saveRate">—</div>
    </div>
  </div>

  <!-- ─── SECTION 3: 계좌별 주식 포트폴리오 ─── -->
  <div class="section-title">계좌별 주식 포트폴리오</div>
  <div id="portfolio-section"></div>
  <div class="actions-row">
    <button class="btn btn-ghost" onclick="addPortfolioAccount()">+ 포트폴리오 계좌 추가</button>
  </div>

  <!-- ─── SECTION 4: 예금 적금 보유 현황 ─── -->
  <div class="section-title">예금 적금 보유 현황</div>
  <div class="table-wrap">
    <table id="maturity-table">
      <thead>
        <tr>
          <th>계좌명</th>
          <th>종류</th>
          <th>월 저축</th>
          <th>입금일 (매월)</th>
          <th>금리 (%)</th>
          <th>가입일</th>
          <th>만기일</th>
          <th>현재 기준 총 납입금</th>
          <th>만기 시 예상 금액</th>
          <th>D-DAY</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="maturity-body">
        <tr class="empty-row"><td colspan="11">+ 버튼을 눌러 적금을 추가하세요</td></tr>
      </tbody>
    </table>
  </div>
  <div class="actions-row">
    <button class="btn btn-primary" onclick="addMaturityRow()">+ 적금 추가</button>
  </div>

</div><!-- /wrap -->

<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/savings.js"></script>
<script src="js/portfolio.js"></script>
<script src="js/maturity.js"></script>
<script src="js/main.js"></script>
</body>
</html>
