<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f0d;
    --surface: #111916;
    --surface2: #172018;
    --border: #1f2e22;
    --accent: #00e676;
    --accent2: #69f0ae;
    --accent-dim: rgba(0,230,118,0.12);
    --accent-glow: rgba(0,230,118,0.25);
    --red: #ff5252;
    --red-dim: rgba(255,82,82,0.12);
    --cyan: #00e5ff;
    --cyan-dim: rgba(0,229,255,0.12);
    --blue: #448aff;
    --blue-dim: rgba(68,138,255,0.12);
    --yellow: #ffd740;
    --yellow-dim: rgba(255,215,64,0.12);
    --text: #e8f5e9;
    --text2: #81c784;
    --text3: #4caf50;
    --muted: #37474f;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,230,118,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,230,118,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 40px 24px 80px; }

  /* HEADER */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .logo-group h1 {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--accent);
    text-transform: uppercase;
    line-height: 1;
  }
  .logo-group span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 3px;
    text-transform: uppercase;
    display: block;
    margin-top: 4px;
  }
  .header-date {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }
  .header-date strong { color: var(--text2); display: block; font-size: 14px; }

  /* SECTION TITLE */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }
  .card-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card-value {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 600;
    color: var(--accent);
  }
  .card-value.neutral { color: var(--text); }
  .card-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* GRID LAYOUTS */
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 32px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 32px; }

  /* FORM INPUTS */
  .input-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 14px; margin-bottom: 32px; }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-group label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
  }
  input, select {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    padding: 9px 12px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    width: 100%;
  }
  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }
  input[type=date] { color-scheme: dark; }

  /* SAVINGS TABLE */
  .table-wrap { overflow-x: auto; margin-bottom: 32px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  th {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    padding: 10px 14px;
    text-align: left;
    white-space: nowrap;
  }
  td {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(31,46,34,0.5);
    color: var(--text);
    font-size: 13px;
  }
  tr:hover td { background: var(--accent-dim); }
  .mono { font-family: var(--mono); }
  .pos { color: var(--red); }
  .neg { color: var(--cyan); }
  .neutral-val { color: var(--text2); }

  /* ACCOUNT PANEL */
  .account-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .account-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--surface2);
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .account-header:hover { background: rgba(0,230,118,0.05); }
  .account-header-left { display: flex; align-items: center; gap: 12px; }
  .account-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(0,230,118,0.2);
  }
  .account-name { font-weight: 700; font-size: 14px; }
  .account-header-right { display: flex; align-items: center; gap: 24px; }
  .account-stat { text-align: right; }
  .account-stat .label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .account-stat .val { font-family: var(--mono); font-size: 13px; font-weight: 600; }
  .chevron { color: var(--text3); transition: transform .25s; font-size: 16px; }
  .chevron.open { transform: rotate(180deg); }
  .account-body { padding: 0; }
  .account-body.collapsed { display: none; }
  .account-body table { width: 100%; }
  .account-body table thead th { background: transparent; }
  .account-body .add-row-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    cursor: pointer;
    background: none;
    border: none;
    border-top: 1px dashed var(--border);
    width: 100%;
    text-align: left;
    transition: color .15s, background .15s;
  }
  .account-body .add-row-btn:hover { color: var(--accent); background: var(--accent-dim); }

  /* INLINE EDITABLE */
  td[contenteditable=true] {
    outline: none;
    cursor: text;
  }
  td[contenteditable=true]:focus {
    background: var(--accent-dim);
    outline: 1px solid var(--accent);
  }

  /* PROGRESS BAR */
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width .5s ease;
  }

  /* BADGE */
  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 2px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .badge-green { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,82,82,0.2); }
  .badge-red { background: var(--cyan-dim); color: var(--cyan); border: 1px solid rgba(0,229,255,0.2); }
  .badge-blue { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(68,138,255,0.2); }
  .badge-yellow { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(255,215,64,0.2); }

  /* ACTIONS */
  .btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 2px;
    border: 1px solid;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn-ghost {
    background: transparent;
    border-color: var(--border);
    color: var(--text3);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger {
    background: transparent;
    border-color: transparent;
    color: var(--red);
    font-size: 13px;
    padding: 4px 8px;
  }
  .btn-danger:hover { background: var(--red-dim); }

  .actions-row { display: flex; gap: 10px; margin-bottom: 32px; }

  /* SAVINGS SUMMARY CARDS */
  .savings-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    position: relative;
  }
  .savings-card .type-badge {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .savings-card .amount {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .savings-card .maturity {
    font-size: 11px;
    color: var(--muted);
  }
  .savings-card .maturity span { color: var(--yellow); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .grid-4 { grid-template-columns: repeat(2,1fr); }
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .account-header-right { gap: 12px; }
    .account-stat:nth-child(2) { display: none; }
  }
  @media (max-width: 600px) {
    .grid-4 { grid-template-columns: 1fr 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr; }
    header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .account-header-right { display: none; }
  }

  /* DIVIDER INPUT */
  .note {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* TOTAL BAR */
  .total-bar {
    background: var(--accent-dim);
    border: 1px solid rgba(0,230,118,0.2);
    border-radius: 4px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .total-bar .tbl { font-size: 11px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
  .total-bar .tbv { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--accent); }
  .total-bar .tbsub { font-family: var(--mono); font-size: 12px; color: var(--text2); }

  .flex-gap { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

  /* empty state */
  .empty-row td {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 24px;
    font-family: var(--mono);
  }

  td input, td select {
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--border);
    border-radius: 0;
    padding: 4px 2px;
    font-size: 13px;
    color: var(--text);
    width: 100%;
    min-width: 80px;
  }
  td input:focus, td select:focus {
    border-bottom-color: var(--accent);
    box-shadow: none;
    outline: none;
  }
  /* 천단위 콤마 숫자 input */
  .num-input {
    font-family: var(--mono);
    text-align: right;
    min-width: 90px;
  }
  .num-input-card {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    text-align: left;
  }

  .tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 2px; font-family: var(--mono); }
  .tag-isa { background: rgba(68,138,255,0.15); color: var(--blue); }
  .tag-cma { background: rgba(255,215,64,0.15); color: var(--yellow); }
  .tag-pension { background: rgba(0,230,118,0.15); color: var(--accent); }
  .tag-irp { background: rgba(156,39,176,0.15); color: #ce93d8; }
  .tag-savings { background: rgba(255,82,82,0.15); color: var(--red); }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="logo-group">
      <h1>📊 투자 대시보드</h1>
      <span>Investment Portfolio Tracker</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <div class="header-date" style="margin-right:8px;">
        <strong id="today-date"></strong>
        <span id="today-time"></span>
      </div>
      <button class="btn btn-ghost" onclick="exportJSON()">📥 내보내기</button>
      <button class="btn btn-ghost" onclick="importJSON()">📤 불러오기</button>
      <button class="btn btn-primary" onclick="saveToStorage()">💾 저장</button>
      <button class="btn btn-danger" style="border:1px solid var(--border);padding:8px 12px;" onclick="clearAll()">🗑️</button>
    </div>
  </header>

  <!-- ─── SECTION 1: 기본 정보 ─── -->
  <div class="section-title">기본 정보</div>
  <div class="input-row">
    <div class="input-group">
      <label>월 급여 (세후)</label>
      <input type="number" id="salary" placeholder="3,500,000" oninput="recalcAll()">
    </div>
    <div class="input-group">
      <label>기준 연도/월</label>
      <input type="month" id="baseMonth" oninput="recalcAll()">
    </div>
  </div>

  <!-- ─── SUMMARY CARDS ─── -->
  <div class="section-title">핵심 요약</div>
  <div class="grid-4" style="margin-bottom:32px;">
    <div class="card">
      <div class="card-label">월 급여</div>
      <div class="card-value neutral" id="s-salary">—</div>
    </div>
    <div class="card">
      <div class="card-label">월 총 저축액</div>
      <div class="card-value" id="s-monthSave">—</div>
      <div class="progress-bar"><div class="progress-fill" id="s-saveProg" style="width:0%"></div></div>
      <div class="card-sub" id="s-saveRate">저축률 —</div>
    </div>
    <div class="card">
      <div class="card-label">현재 총 자산 <span style="font-size:9px;color:var(--text3);">(계좌 합산)</span></div>
      <div class="card-value neutral" id="s-asset">—</div>
      <div class="card-sub" id="s-assetSub"></div>
    </div>
    <div class="card">
      <div class="card-label">총 수익 <span style="font-size:9px;opacity:0.7;">(주가+배당)</span></div>
      <div class="card-value" id="s-profit">—</div>
      <div class="card-sub" id="s-profitRate">총 — | 주가 —</div>
    </div>
  </div>

  <!-- ─── SECTION 2: 저축 계좌 현황 ─── -->
  <div class="section-title">계좌별 월 저축 현황</div>
  <div id="savings-grid" class="grid-3" style="margin-bottom:8px;"></div>
  <!-- TOTAL -->
  <div class="total-bar">
    <div>
      <div class="tbl">월 총 저축액 합계</div>
      <div class="tbv" id="tb-monthTotal">₩0</div>
    </div>
    <div>
      <div class="tbl">연간 예상 저축</div>
      <div class="tbv" id="tb-yearTotal">₩0</div>
    </div>
    <div>
      <div class="tbl">저축률</div>
      <div class="tbv" id="tb-saveRate">—</div>
    </div>
  </div>

  <!-- ─── SECTION 3: 계좌별 주식 포트폴리오 ─── -->
  <div class="section-title">계좌별 주식 포트폴리오</div>
  <div id="portfolio-section"></div>
  <div class="actions-row">
    <button class="btn btn-ghost" onclick="addPortfolioAccount()">+ 포트폴리오 계좌 추가</button>
  </div>

  <!-- ─── SECTION 4: 적금 만기일 ─── -->
  <div class="section-title">적금 만기 일정</div>
  <div class="table-wrap">
    <table id="maturity-table">
      <thead>
        <tr>
          <th>계좌명</th>
          <th>종류</th>
          <th>월 저축</th>
          <th>입금일 (매월)</th>
          <th>금리 (%)</th>
          <th>가입일</th>
          <th>만기일</th>
          <th>현재 기준 총 납입금</th>
          <th>만기 시 예상 금액</th>
          <th>D-DAY</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="maturity-body">
        <tr class="empty-row"><td colspan="11">+ 버튼을 눌러 적금을 추가하세요</td></tr>
      </tbody>
    </table>
  </div>
  <div class="actions-row">
    <button class="btn btn-primary" onclick="addMaturityRow()">+ 적금 추가</button>
  </div>

</div><!-- /wrap -->

<script>
// ─────────────── STATE ───────────────
const state = {
  savings: [],        // { id, type, name, monthlyAmt, totalPrincipal, currentAmt, maturityDate }
  portfolios: [],     // { id, accountName, type, stocks: [{id, name, qty, avgPrice, curPrice, dividend, monthlyBuy}] }
  maturity: [],       // { id, name, type, principal, rate, startDate, endDate }
};

// Account types
const ACCOUNT_TYPES = ['ISA','CMA','과세연금저축','비과세연금저축','IRP','적금','기타'];
const TYPE_CLASS = {
  'ISA':'tag-isa','CMA':'tag-cma',
  '과세연금저축':'tag-pension','비과세연금저축':'tag-pension',
  'IRP':'tag-irp','적금':'tag-savings','기타':''
};

// ─────────────── UTILS ───────────────
const fmtKRW = v => {
  if (!v && v !== 0) return '—';
  return '₩' + Number(v).toLocaleString('ko-KR');
};
const fmtNum = v => v ? Number(v).toLocaleString('ko-KR') : '—';
const fmtComma = v => (!v && v!==0) ? '' : Number(v).toLocaleString('ko-KR');
const parseComma = v => Number(String(v).replace(/,/g,'')) || 0;
const pct = (a,b) => b ? ((a-b)/b*100).toFixed(2) : '0.00';
let idCnt = 1;
const uid = () => idCnt++;

// ─────────────── 숫자 INPUT 헬퍼 ───────────────
const _debMap = new WeakMap();

function mkNum(value, cbStr, style='', ph='0', tabAttr=''){
  const display = value ? fmtComma(value) : '';
  const escaped = cbStr.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  return `<input type="text" inputmode="numeric" class="num-input"
    value="${display}" placeholder="${ph}"
    style="${style}"
    data-cb="${escaped}"
    onfocus="nFocus(this)"
    onblur="nBlur(this)"
    oninput="nInput(this)"
    ${tabAttr}>`;
}

function nFocus(el){
  const raw = parseComma(el.value);
  el.value = raw || '';
  el.select();
}
function nBlur(el){
  const v = parseComma(el.value);
  el.value = v ? fmtComma(v) : '';
  if(_debMap.has(el)){ clearTimeout(_debMap.get(el)); _debMap.delete(el); }
  _execCb(el.dataset.cb, v);
}
function nInput(el){
  if(_debMap.has(el)) clearTimeout(_debMap.get(el));
  _debMap.set(el, setTimeout(()=>{ _execCb(el.dataset.cb, parseComma(el.value)); }, 1000));
}
function _execCb(cbStr, v){
  try{ (new Function('v', cbStr))(v); } catch(e){ console.warn('_execCb error:', cbStr, e); }
}
function nInput(el){
  if(_debMap.has(el)) clearTimeout(_debMap.get(el));
  _debMap.set(el, setTimeout(()=>{ _execCb(el.dataset.cb, parseComma(el.value)); }, 1000));
}
function _execCb(cbStr, v){
  try{ (new Function('v', cbStr))(v); } catch(e){ console.warn('_execCb error:', cbStr, e); }
}

// 일반 텍스트 input — 디바운스 500ms
function mkText(value, cbStr, attrs=''){
  const escaped = cbStr.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  return `<input type="text" value="${value||''}"
    data-cb="${escaped}"
    oninput="nInputText(this)"
    onblur="nBlurText(this)"
    ${attrs}>`;
}
// 날짜 input — YYYY/MM/DD 텍스트 입력, 1000ms 디바운스
function mkDate(value, cbStr, attrs=''){
  const escaped = cbStr.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  // 저장값 YYYY-MM-DD → 표시 YYYY/MM/DD
  const display = value ? value.replace(/-/g,'/') : '';
  return `<input type="text" inputmode="numeric" placeholder="YYYY/MM/DD"
    value="${display}"
    data-cb="${escaped}"
    style="max-width:110px;font-family:var(--mono);"
    oninput="dateTextInput(this)"
    onblur="dateTextBlur(this)"
    ${attrs}>`;
}

function _parseDateText(raw){
  // YYYY/MM/DD 또는 YYYYMMDD → YYYY-MM-DD
  const s = raw.replace(/[\/\-\s]/g,'');
  if(s.length === 8){
    return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  }
  return null;
}

function dateTextInput(el){
  // 숫자만 추출
  let digits = el.value.replace(/[^0-9]/g,'');
  // 최대 8자리
  if(digits.length > 8) digits = digits.slice(0,8);
  // YYYY/MM/DD 포맷으로 재조합
  let formatted = digits;
  if(digits.length > 4) formatted = digits.slice(0,4) + '/' + digits.slice(4);
  if(digits.length > 6) formatted = digits.slice(0,4) + '/' + digits.slice(4,6) + '/' + digits.slice(6);
  el.value = formatted;
  // 8자리 완성 시 디바운스 없이 즉시 반영
  if(digits.length === 8){
    if(_debMap.has(el)){ clearTimeout(_debMap.get(el)); _debMap.delete(el); }
    const iso = _parseDateText(formatted);
    if(iso) _execCb(el.dataset.cb, iso);
    return;
  }
  if(_debMap.has(el)) clearTimeout(_debMap.get(el));
  _debMap.set(el, setTimeout(()=>{
    const iso = _parseDateText(el.value);
    if(iso) _execCb(el.dataset.cb, iso);
  }, 1000));
}

function dateTextBlur(el){
  if(_debMap.has(el)){ clearTimeout(_debMap.get(el)); _debMap.delete(el); }
  const iso = _parseDateText(el.value);
  if(iso) _execCb(el.dataset.cb, iso);
}

// 소수점 숫자(금리, 배당률 등) — 1000ms 디바운스
function mkNumDec(value, cbStr, attrs=''){
  const escaped = cbStr.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  return `<input type="text" inputmode="decimal" value="${value||''}" placeholder="0.0"
    data-cb="${escaped}"
    onfocus="this.select()"
    oninput="nInputText(this)"
    onblur="nBlurText(this)"
    ${attrs}>`;
}

function nInputText(el){
  if(_debMap.has(el)) clearTimeout(_debMap.get(el));
  _debMap.set(el, setTimeout(()=>{ _execCb(el.dataset.cb, el.value); }, 1000));
}
function nBlurText(el){
  if(_debMap.has(el)){ clearTimeout(_debMap.get(el)); _debMap.delete(el); }
  _execCb(el.dataset.cb, el.value);
}

// Fixed accounts always displayed (not deletable)
const FIXED_PORTFOLIO_TYPES = ['ISA','CMA','과세연금저축','IRP'];

function ensureFixedPortfolios(){
  FIXED_PORTFOLIO_TYPES.forEach(type => {
    const exists = state.portfolios.find(p => p.fixed && p.type === type);
    if(!exists){
      state.portfolios.unshift({
        id: uid(),
        accountName: type + ' 포트폴리오',
        type,
        fixed: true,
        stocks: []
      });
    }
  });
  // Keep fixed accounts in order at top
  state.portfolios.sort((a,b) => {
    const ai = FIXED_PORTFOLIO_TYPES.indexOf(a.fixed ? a.type : '__');
    const bi = FIXED_PORTFOLIO_TYPES.indexOf(b.fixed ? b.type : '__');
    if(ai === -1 && bi === -1) return 0;
    if(ai === -1) return 1;
    if(bi === -1) return -1;
    return ai - bi;
  });
}

function updateStock(pid, sid, field, value){
  const p = state.portfolios.find(x=>x.id===pid);
  if(!p) return;
  const s = p.stocks.find(x=>x.id===sid);
  if(!s) return;
  const numFields = ['qty','avgPrice','curPrice','dividend','monthlyBuy'];
  s[field] = numFields.includes(field) ? Number(value) : value;

  if(field === 'dividendCycle' || field === 'dividendDate'){
    // 배당 주기/날짜 변경은 UI 구조가 바뀌므로 전체 재렌더
    renderPortfolios();
    renderSavings();
    recalcAll();
  } else if(numFields.includes(field)){
    // 숫자 필드: 계산 결과 셀만 DOM 직접 업데이트 (재렌더 없음 → 포커스 유지)
    updateStockCells(p, s);
    updatePortfolioHeader(p);
    renderSavings();
    recalcAll();
  }
  scheduleSave();
}

// 종목 행의 계산 결과 셀만 직접 업데이트
function updateStockCells(p, s){
  const val  = s.qty * s.curPrice;
  const cost = s.qty * s.avgPrice;
  const pnl  = val - cost;
  const accDiv = s.accumulatedDividend || 0;
  const totalPnl = pnl + accDiv;
  const pr   = cost ? (pnl/cost*100).toFixed(2) : '0.00';
  const tr2  = cost ? (totalPnl/cost*100).toFixed(2) : '0.00';
  const isPos = Number(pr) >= 0;
  const isTotPos = Number(tr2) >= 0;
  const cycle = s.dividendCycle || '연';
  const annualDiv = s.dividend || 0;
  let periodDiv = annualDiv;
  if(cycle === '월')       periodDiv = annualDiv/12;
  else if(cycle === '분기') periodDiv = annualDiv/4;
  const expDiv = val * (periodDiv / 100);

  // 행 찾기: stock id로 특정
  const row = document.querySelector(`tr.stock-row[data-sid="${s.id}"]`);
  if(!row) return;
  const cells = row.querySelectorAll('td');
  // td 순서: 0종목명 1수량 2평단가 3현재가 4평가금액 5수익금 6주가수익률 7배당률 8배당주기 9다음배당일 10예상배당금 11실배당 12누적배당 13총수익률 14월매수금 15삭제
  cells[4].textContent = val ? '₩'+val.toLocaleString('ko-KR') : '—';
  cells[4].className = 'mono neutral-val';
  cells[5].textContent = (pnl>=0?'+':'')+('₩'+Math.abs(pnl).toLocaleString('ko-KR'));
  cells[5].className = `mono ${isPos?'pos':'neg'}`;
  cells[6].innerHTML = `<span class="badge ${isPos?'badge-green':'badge-red'}">${isPos?'+':''}${pr}%</span>`;
  cells[10].textContent = expDiv > 0 ? '₩'+Math.round(expDiv).toLocaleString('ko-KR') : '—';
  cells[10].className = `mono ${expDiv>0?'pos':''}`;
  cells[13].innerHTML = `<span class="badge ${isTotPos?'badge-green':'badge-red'}">${isTotPos?'+':''}${tr2}%</span>`;
}

// 계좌 헤더 요약 직접 업데이트
function updatePortfolioHeader(p){
  const panel = document.getElementById(`ph-${p.id}`);
  if(!panel) return;
  const totCost  = p.stocks.reduce((a,s)=>a+s.qty*s.avgPrice,0);
  const totVal   = p.stocks.reduce((a,s)=>a+s.qty*s.curPrice,0);
  const totPnl   = totVal - totCost;
  const totDiv   = p.stocks.reduce((a,s)=>a+(s.accumulatedDividend||0),0);
  const totTotal = totPnl + totDiv;
  const pnlRate  = totCost ? (totPnl/totCost*100).toFixed(2) : 0;
  const totRate  = totCost ? (totTotal/totCost*100).toFixed(2) : 0;
  const stats = panel.querySelectorAll('.account-stat .val');
  if(stats[0]) stats[0].textContent = totVal ? '₩'+totVal.toLocaleString('ko-KR') : '—';
  if(stats[1]){
    stats[1].textContent = (totPnl>=0?'+':'')+('₩'+Math.abs(totPnl).toLocaleString('ko-KR'))+' ('+(totPnl>=0?'+':'')+pnlRate+'%)';
    stats[1].className = `val ${totPnl>=0?'pos':'neg'}`;
  }
  if(stats[2]){
    stats[2].textContent = (totTotal>=0?'+':'')+('₩'+Math.abs(totTotal).toLocaleString('ko-KR'))+' ('+(totTotal>=0?'+':'')+totRate+'%)';
    stats[2].className = `val ${totTotal>=0?'pos':'neg'}`;
  }
}

function addDividend(pid, sid){
  const p = state.portfolios.find(x=>x.id===pid);
  if(!p) return;
  const s = p.stocks.find(x=>x.id===sid);
  if(!s) return;
  const inputEl = document.getElementById(`div-input-${sid}`);
  const amount = Number(inputEl ? inputEl.value : 0);
  if(!amount || amount <= 0){ showToast('⚠️ 배당 지급액을 입력하세요'); return; }
  const stockName = s.name || '해당 종목';
  if(confirm(`${stockName}의 배당금 ${fmtKRW(amount)}을 총 수익률에 추가할까요?\n(누적 배당금에 합산됩니다)`)){
    s.accumulatedDividend = (s.accumulatedDividend || 0) + amount;
    if(inputEl) inputEl.value = '';
    renderPortfolios();
    renderSavings();
    recalcAll();
    scheduleSave();
    showToast(`✅ 배당금 ${fmtKRW(amount)} 추가됨 (누적: ${fmtKRW(s.accumulatedDividend)})`);
  }
}

// 만기 테이블 월 저축 입력 → 저축 카드 monthlyAmt 에 반영 (1번 요청: 반대 방향)
function updateMaturityMonthly(id, value){
  const s = state.savings.find(x=>x.id===id);
  if(s){
    s.monthlyAmt = Number(value);
    // 저축 카드의 월 저축 input DOM 직접 업데이트 (리렌더 없이)
    const cardInput = document.querySelector(`#sc-${id} .num-input`);
    if(cardInput) cardInput.value = value ? fmtComma(value) : '';
  }
  recalcAll();
  scheduleSave();
}

function updatePortfolioName(id, val){
  const p = state.portfolios.find(x=>x.id===id);
  if(!p) return;
  p.accountName = val;
  // 연결된 저축 카드 이름도 동기화 (비고정 계좌만)
  if(!p.fixed){
    const s = state.savings.find(x=>x.id===id);
    if(s){
      s.name = val;
      const nameInput = document.querySelector(`#sc-${id} .savings-name-input`);
      if(nameInput) nameInput.value = val;
    }
  }
}

function updatePortfolioType(id, val){
  const p = state.portfolios.find(x=>x.id===id);
  if(!p) return;
  p.type = val;
  const defaultNames = ['ISA','CMA','과세연금저축','비과세연금저축','IRP','적금','기타','새 계좌'];
  if(defaultNames.some(n => p.accountName === n || p.accountName === n + ' 포트폴리오' || p.accountName === '새 계좌')){
    p.accountName = val + ' 포트폴리오';
  }
  // 연결된 저축 카드 타입/이름도 동기화
  if(!p.fixed){
    const s = state.savings.find(x=>x.id===id);
    if(s){
      s.type = val;
      s.name = p.accountName;
    }
  }
  renderPortfolios();
  renderSavings();
  scheduleSave();
}

// 적금 만기 일정 추가 → 저축 현황에 적금 카드 자동 생성 (같은 id로 연결)
function addMaturityRow(){
  const id = uid();
  state.maturity.push({id, name:'', type:'적금', rate:0, payDay:'', startDate:'', endDate:''});
  state.savings.push({id, type:'적금', name:'', monthlyAmt:0, totalPrincipal:0, currentAmt:0, maturityDate:''});
  renderAll();
  setTimeout(() => {
    const el = document.querySelector(`#mat-name-${id}`);
    if(el){ el.focus(); }
  }, 50);
  scheduleSave();
}

function removeMaturity(id){
  state.maturity = state.maturity.filter(x=>x.id!==id);
  state.savings = state.savings.filter(x=>x.id!==id);
  renderAll();
  scheduleSave();
}

function updateMaturity(id, field, value){
  const m = state.maturity.find(x=>x.id===id);
  if(!m) return;
  m[field] = ['rate','payDay'].includes(field) ? Number(value) : value;
  if(field === 'name'){
    const s = state.savings.find(x=>x.id===id);
    if(s) s.name = value;
    const nameInput = document.querySelector(`#sc-${id} .savings-name-input`);
    if(nameInput) nameInput.value = value;
  }
  if(field !== 'name'){
    renderMaturity();
    recalcAll();
  }
  scheduleSave();
}

function updateSavings(id, field, value){
  const s = state.savings.find(x=>x.id===id);
  if(!s) return;
  s[field] = ['monthlyAmt','totalPrincipal','currentAmt'].includes(field) ? Number(value) : value;
  if(field === 'name' && s.type === '적금'){
    const m = state.maturity.find(x=>x.id===id);
    if(m){
      m.name = value;
      // 만기 일정 이름도 DOM 직접 업데이트 (리렌더 없이)
      const matInput = document.querySelector(`#mat-name-${id}`);
      if(matInput) matInput.value = value;
    }
  }
  // 월 저축 변경 시 만기 테이블 총 납입금/만기금액도 갱신
  if(field === 'monthlyAmt' && s.type === '적금'){
    renderMaturity();
  }
  if(field !== 'name'){
    recalcAll();
  }
  scheduleSave();
}

// 저축 카드에서 적금 삭제 → 만기 일정도 삭제
function removeSavings(id){
  const s = state.savings.find(x=>x.id===id);
  if(s && s.type === '적금'){
    state.maturity = state.maturity.filter(x=>x.id!==id);
  }
  // 연결된 비고정 포트폴리오도 삭제
  const linked = state.portfolios.find(x=>x.id===id && !x.fixed);
  if(linked) state.portfolios = state.portfolios.filter(x=>x.id!==id);
  state.savings = state.savings.filter(x=>x.id!==id);
  renderAll();
  scheduleSave();
}

function dDay(dateStr){
  if(!dateStr) return '—';
  const diff = Math.ceil((new Date(dateStr) - new Date()) / 86400000);
  return diff >= 0 ? diff : '만기';
}

// 만기 시 예상 금액: 가입 첫 달 포함 (총 개월+1회 납입) 단리 적금
function calcMaturityAmt(monthlyAmt, rate, start, end){
  if(!monthlyAmt || !start || !end) return 0;
  const s = new Date(start), e = new Date(end);
  const totalMonths = Math.round((e - s) / (1000*60*60*24*30.44));
  if(totalMonths <= 0) return 0;
  const payCount = totalMonths + 1; // 최초 가입일 납입 포함
  const totalPrincipal = monthlyAmt * payCount;
  // 단리 적금 이자 = 월 저축 × 회차(회차+1)/2 × 연금리/12/100
  const interest = monthlyAmt * (payCount * (payCount + 1) / 2) * ((rate||0) / 100 / 12);
  return Math.round(totalPrincipal + interest);
}

function renderMaturity(){
  const tbody = document.getElementById('maturity-body');
  if(!state.maturity.length){
    tbody.innerHTML = '<tr class="empty-row"><td colspan="11">+ 버튼을 눌러 적금을 추가하세요</td></tr>';
    return;
  }
  tbody.innerHTML = state.maturity.map(m => {
    const dd = dDay(m.endDate);
    const ddLabel = dd === '만기' ? `<span class="badge badge-red">만기</span>`
                  : dd <= 30    ? `<span class="badge badge-yellow">D-${dd}</span>`
                  :               `<span class="badge badge-blue">D-${dd}</span>`;

    // 연동된 저축 카드에서 월 저축 금액 가져오기
    const linkedSaving = state.savings.find(x=>x.id===m.id);
    const monthlyAmt = linkedSaving ? (linkedSaving.monthlyAmt || 0) : 0;

    // 현재 기준 총 납입금 = (경과 개월 수 + 1) × 월 저축금액 (최초 가입일 납입 포함)
    let totalPaid = 0;
    if(m.startDate && monthlyAmt > 0){
      const start = new Date(m.startDate);
      const now   = new Date();
      const elapsedMonths = Math.max(0,
        (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth())
      );
      totalPaid = (elapsedMonths + 1) * monthlyAmt;
    }

    // 만기 시 예상 금액 (단리 적금)
    const maturityAmt = calcMaturityAmt(monthlyAmt, m.rate, m.startDate, m.endDate);

    return `
    <tr class="mat-row">
      <td>${mkText(m.name, `updateMaturity(${m.id},'name',v)`, `id="mat-name-${m.id}" placeholder="계좌명"`)}</td>
      <td>
        <select onchange="updateMaturity(${m.id},'type',this.value)">
          ${['적금','예금','청약','기타'].map(t=>`<option ${m.type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </td>
      <td>${mkNum(monthlyAmt, `updateMaturityMonthly(${m.id},v)`)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:4px;">
          <span style="font-size:11px;color:var(--muted);">매월</span>
          ${mkNum(m.payDay||0, `updateMaturity(${m.id},'payDay',v)`, 'max-width:44px;', '25')}
          <span style="font-size:11px;color:var(--muted);">일</span>
        </div>
      </td>
      <td>${mkNumDec(m.rate, `updateMaturity(${m.id},'rate',v)`, 'style="max-width:70px;"')}</td>
      <td>${mkDate(m.startDate, `updateMaturity(${m.id},'startDate',v)`)}</td>
      <td>${mkDate(m.endDate, `updateMaturity(${m.id},'endDate',v)`)}</td>
      <td class="mono neutral-val">${totalPaid ? fmtKRW(totalPaid) : '—'}</td>
      <td class="mono pos">${maturityAmt ? fmtKRW(maturityAmt) : '—'}</td>
      <td>${m.endDate ? ddLabel : '—'}</td>
      <td><button class="btn btn-danger" onclick="removeMaturity(${m.id})">✕</button></td>
    </tr>`;
  }).join('');
}

// ─────────────── RECALC ───────────────
function recalcAll(){
  const salary = Number(document.getElementById('salary').value) || 0;

  // Monthly savings total
  const monthSave = state.savings.reduce((a,s)=>a+s.monthlyAmt,0);

  // Total asset = sum of all account currentAmt
  const totalAsset = state.savings.reduce((a,s)=>a+(s.currentAmt||0),0);
  const totalPrincipal = state.savings.reduce((a,s)=>a+(s.totalPrincipal||0),0);

  // Portfolio stats
  const totCost  = state.portfolios.reduce((a,p)=>a+p.stocks.reduce((b,s)=>b+s.qty*s.avgPrice,0),0);
  const totVal   = state.portfolios.reduce((a,p)=>a+p.stocks.reduce((b,s)=>b+s.qty*s.curPrice,0),0);
  const totPnl   = totVal - totCost;   // 주가 수익
  const totAccDiv= state.portfolios.reduce((a,p)=>a+p.stocks.reduce((b,s)=>b+(s.accumulatedDividend||0),0),0);
  const totTotal = totPnl + totAccDiv; // 총 수익 (주가 + 배당)
  const priceRate = totCost ? (totPnl/totCost*100).toFixed(2)   : 0;
  const totalRate = totCost ? (totTotal/totCost*100).toFixed(2) : 0;

  // Header cards
  document.getElementById('s-salary').textContent = salary ? fmtKRW(salary) : '—';

  const msEl = document.getElementById('s-monthSave');
  msEl.textContent = fmtKRW(monthSave);
  const saveRate = salary ? Math.min((monthSave/salary*100),100) : 0;
  const saveRatePct = salary ? (monthSave/salary*100).toFixed(1) : 0;
  document.getElementById('s-saveProg').style.width = saveRate + '%';
  document.getElementById('s-saveRate').textContent = `저축률 ${saveRatePct}%`;

  document.getElementById('s-asset').textContent = totalAsset ? fmtKRW(totalAsset) : '—';
  if(totalPrincipal > 0 && totalAsset > 0){
    const assetPnl = totalAsset - totalPrincipal;
    const assetRate = (assetPnl/totalPrincipal*100).toFixed(2);
    document.getElementById('s-assetSub').textContent =
      `원금 ${fmtKRW(totalPrincipal)} / ${assetPnl>=0?'+':''}${assetRate}%`;
  } else {
    document.getElementById('s-assetSub').textContent = '';
  }

  const profEl = document.getElementById('s-profit');
  profEl.textContent = totTotal ? (totTotal>0?'+':'')+fmtKRW(totTotal) : '—';
  profEl.className = 'card-value ' + (totTotal>0?'pos':totTotal<0?'neg':'');
  document.getElementById('s-profitRate').textContent =
    `총 ${totTotal>0?'+':''}${totalRate}%  |  주가 ${totPnl>0?'+':''}${priceRate}%`;

  // Total bar
  document.getElementById('tb-monthTotal').textContent = fmtKRW(monthSave);
  document.getElementById('tb-yearTotal').textContent = fmtKRW(monthSave*12);
  document.getElementById('tb-saveRate').textContent = salary ? saveRatePct+'%' : '—';
}

const LS_KEY = 'investment_dashboard_v1';

function saveToStorage(){
  const data = {
    salary:    document.getElementById('salary').value,
    baseMonth: document.getElementById('baseMonth').value,
    savings:   state.savings,
    portfolios:state.portfolios,
    maturity:  state.maturity,
    idCnt,
  };
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e){}
  showToast('💾 저장됨');
}

function loadFromStorage(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(data.salary)     document.getElementById('salary').value     = data.salary;
    if(data.baseMonth)  document.getElementById('baseMonth').value  = data.baseMonth;
    if(data.savings)    state.savings    = data.savings;
    if(data.portfolios) state.portfolios = data.portfolios;
    if(data.maturity)   state.maturity   = data.maturity;
    if(data.idCnt)      idCnt = data.idCnt;
    return true;
  } catch(e){ return false; }
}

// Auto-save on any state mutation — debounced
let saveTimer = null;
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToStorage, 800);
}

// Patch remaining mutating functions to auto-save
// (updateSavings/removeSavings/updateMaturity/removeMaturity/addMaturityRow call scheduleSave directly)
['updateStock','removeStock','removePortfolio',
 'updatePortfolioName','updatePortfolioType','addPortfolioAccount',
 'addStock'].forEach(fn => {
  const orig = window[fn];
  if(orig) window[fn] = function(){ orig.apply(this, arguments); scheduleSave(); };
});
// Also save on basic input changes
['salary','baseMonth'].forEach(id => {
  document.getElementById(id).addEventListener('input', scheduleSave);
});

// ─────────────── EXPORT / IMPORT ───────────────
function exportJSON(){
  const data = {
    exportedAt: new Date().toISOString(),
    salary:    document.getElementById('salary').value,
    baseMonth: document.getElementById('baseMonth').value,
    savings:   state.savings,
    portfolios:state.portfolios,
    maturity:  state.maturity,
    idCnt,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  const date = new Date().toISOString().slice(0,10);
  a.download = `투자대시보드_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📥 파일로 내보내기 완료');
}

function importJSON(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if(data.salary)     document.getElementById('salary').value     = data.salary;
        if(data.baseMonth)  document.getElementById('baseMonth').value  = data.baseMonth;
        if(data.savings)    state.savings    = data.savings;
        if(data.portfolios) state.portfolios = data.portfolios;
        if(data.maturity)   state.maturity   = data.maturity;
        if(data.idCnt)      idCnt = data.idCnt;
        renderAll();
        saveToStorage();
        showToast('✅ 불러오기 완료!');
      } catch(err){
        showToast('❌ 파일 형식이 올바르지 않습니다');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function clearAll(){
  if(!confirm('모든 데이터를 초기화할까요? 이 작업은 되돌릴 수 없습니다.')) return;
  localStorage.removeItem(LS_KEY);
  state.savings = []; state.portfolios = []; state.maturity = [];
  ['salary','baseMonth'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  document.getElementById('baseMonth').value = new Date().toISOString().slice(0,7);
  renderAll();
  showToast('🗑️ 초기화 완료');
}

function renderAll(){
  renderSavings();
  renderPortfolios();
  renderMaturity();
  recalcAll();
}

// ─────────────── TOAST ───────────────
function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = `
      position:fixed; bottom:28px; right:28px; z-index:9999;
      background:#1a2e1c; border:1px solid rgba(0,230,118,0.3);
      color:#e8f5e9; font-family:'IBM Plex Mono',monospace; font-size:12px;
      padding:10px 18px; border-radius:4px; opacity:0;
      transition:opacity .25s; pointer-events:none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    `;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 2200);
}

// ─────────────── TAB 키 행 내 이동 ───────────────
document.addEventListener('keydown', function(e){
  if(e.key !== 'Tab') return;
  const row = e.target.closest('tr.stock-row, tr.mat-row');
  if(!row) return;
  const focusable = Array.from(row.querySelectorAll('input, select')).filter(el => !el.disabled);
  const idx = focusable.indexOf(e.target);
  if(idx === -1) return;
  e.preventDefault();
  const next = e.shiftKey ? focusable[idx-1] : focusable[idx+1];
  if(next) next.focus();
});
