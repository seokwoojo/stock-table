<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f0d;
    --surface: #111916;
    --surface2: #172018;
    --border: #1f2e22;
    --accent: #00e676;
    --accent2: #69f0ae;
    --accent-dim: rgba(0,230,118,0.12);
    --accent-glow: rgba(0,230,118,0.25);
    --red: #ff5252;
    --red-dim: rgba(255,82,82,0.12);
    --blue: #448aff;
    --blue-dim: rgba(68,138,255,0.12);
    --yellow: #ffd740;
    --yellow-dim: rgba(255,215,64,0.12);
    --text: #e8f5e9;
    --text2: #81c784;
    --text3: #4caf50;
    --muted: #37474f;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,230,118,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,230,118,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 40px 24px 80px; }

  /* HEADER */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .logo-group h1 {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--accent);
    text-transform: uppercase;
    line-height: 1;
  }
  .logo-group span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 3px;
    text-transform: uppercase;
    display: block;
    margin-top: 4px;
  }
  .header-date {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }
  .header-date strong { color: var(--text2); display: block; font-size: 14px; }

  /* SECTION TITLE */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }
  .card-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card-value {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 600;
    color: var(--accent);
  }
  .card-value.neutral { color: var(--text); }
  .card-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* GRID LAYOUTS */
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 32px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 32px; }

  /* FORM INPUTS */
  .input-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 14px; margin-bottom: 32px; }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-group label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
  }
  input, select {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    padding: 9px 12px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    width: 100%;
  }
  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }
  input[type=date] { color-scheme: dark; }

  /* SAVINGS TABLE */
  .table-wrap { overflow-x: auto; margin-bottom: 32px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  th {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    padding: 10px 14px;
    text-align: left;
    white-space: nowrap;
  }
  td {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(31,46,34,0.5);
    color: var(--text);
    font-size: 13px;
  }
  tr:hover td { background: var(--accent-dim); }
  .mono { font-family: var(--mono); }
  .pos { color: var(--accent); }
  .neg { color: var(--red); }
  .neutral-val { color: var(--text2); }

  /* ACCOUNT PANEL */
  .account-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .account-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--surface2);
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .account-header:hover { background: rgba(0,230,118,0.05); }
  .account-header-left { display: flex; align-items: center; gap: 12px; }
  .account-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(0,230,118,0.2);
  }
  .account-name { font-weight: 700; font-size: 14px; }
  .account-header-right { display: flex; align-items: center; gap: 24px; }
  .account-stat { text-align: right; }
  .account-stat .label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .account-stat .val { font-family: var(--mono); font-size: 13px; font-weight: 600; }
  .chevron { color: var(--text3); transition: transform .25s; font-size: 16px; }
  .chevron.open { transform: rotate(180deg); }
  .account-body { padding: 0; }
  .account-body.collapsed { display: none; }
  .account-body table { width: 100%; }
  .account-body table thead th { background: transparent; }
  .account-body .add-row-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    cursor: pointer;
    background: none;
    border: none;
    border-top: 1px dashed var(--border);
    width: 100%;
    text-align: left;
    transition: color .15s, background .15s;
  }
  .account-body .add-row-btn:hover { color: var(--accent); background: var(--accent-dim); }

  /* INLINE EDITABLE */
  td[contenteditable=true] {
    outline: none;
    cursor: text;
  }
  td[contenteditable=true]:focus {
    background: var(--accent-dim);
    outline: 1px solid var(--accent);
  }

  /* PROGRESS BAR */
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width .5s ease;
  }

  /* BADGE */
  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 2px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .badge-green { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(0,230,118,0.2); }
  .badge-red { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,82,82,0.2); }
  .badge-blue { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(68,138,255,0.2); }
  .badge-yellow { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(255,215,64,0.2); }

  /* ACTIONS */
  .btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 2px;
    border: 1px solid;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn-ghost {
    background: transparent;
    border-color: var(--border);
    color: var(--text3);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger {
    background: transparent;
    border-color: transparent;
    color: var(--red);
    font-size: 13px;
    padding: 4px 8px;
  }
  .btn-danger:hover { background: var(--red-dim); }

  .actions-row { display: flex; gap: 10px; margin-bottom: 32px; }

  /* SAVINGS SUMMARY CARDS */
  .savings-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    position: relative;
  }
  .savings-card .type-badge {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .savings-card .amount {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .savings-card .maturity {
    font-size: 11px;
    color: var(--muted);
  }
  .savings-card .maturity span { color: var(--yellow); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .grid-4 { grid-template-columns: repeat(2,1fr); }
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .account-header-right { gap: 12px; }
    .account-stat:nth-child(2) { display: none; }
  }
  @media (max-width: 600px) {
    .grid-4 { grid-template-columns: 1fr 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr; }
    header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .account-header-right { display: none; }
  }

  /* DIVIDER INPUT */
  .note {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* TOTAL BAR */
  .total-bar {
    background: var(--accent-dim);
    border: 1px solid rgba(0,230,118,0.2);
    border-radius: 4px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .total-bar .tbl { font-size: 11px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
  .total-bar .tbv { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--accent); }
  .total-bar .tbsub { font-family: var(--mono); font-size: 12px; color: var(--text2); }

  .flex-gap { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

  /* empty state */
  .empty-row td {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 24px;
    font-family: var(--mono);
  }

  td input, td select {
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--border);
    border-radius: 0;
    padding: 4px 2px;
    font-size: 13px;
    color: var(--text);
    width: 100%;
    min-width: 80px;
  }
  td input:focus, td select:focus {
    border-bottom-color: var(--accent);
    box-shadow: none;
    outline: none;
  }

  .tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 2px; font-family: var(--mono); }
  .tag-isa { background: rgba(68,138,255,0.15); color: var(--blue); }
  .tag-cma { background: rgba(255,215,64,0.15); color: var(--yellow); }
  .tag-pension { background: rgba(0,230,118,0.15); color: var(--accent); }
  .tag-irp { background: rgba(156,39,176,0.15); color: #ce93d8; }
  .tag-savings { background: rgba(255,82,82,0.15); color: var(--red); }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="logo-group">
      <h1>📊 투자 대시보드</h1>
      <span>Investment Portfolio Tracker</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <div class="header-date" style="margin-right:8px;">
        <strong id="today-date"></strong>
        <span id="today-time"></span>
      </div>
      <button class="btn btn-ghost" onclick="exportJSON()">📥 내보내기</button>
      <button class="btn btn-ghost" onclick="importJSON()">📤 불러오기</button>
      <button class="btn btn-primary" onclick="saveToStorage()">💾 저장</button>
      <button class="btn btn-danger" style="border:1px solid var(--border);padding:8px 12px;" onclick="clearAll()">🗑️</button>
    </div>
  </header>

  <!-- ─── SECTION 1: 기본 정보 ─── -->
  <div class="section-title">기본 정보</div>
  <div class="input-row">
    <div class="input-group">
      <label>월 급여 (세후)</label>
      <input type="number" id="salary" placeholder="3,500,000" oninput="recalcAll()">
    </div>
    <div class="input-group">
      <label>현재 총 자산</label>
      <input type="number" id="totalAsset" placeholder="50,000,000" oninput="recalcAll()">
    </div>
    <div class="input-group">
      <label>월 총 저축 목표</label>
      <input type="number" id="savingsGoal" placeholder="1,500,000" oninput="recalcAll()">
    </div>
    <div class="input-group">
      <label>기준 연도/월</label>
      <input type="month" id="baseMonth" oninput="recalcAll()">
    </div>
  </div>

  <!-- ─── SUMMARY CARDS ─── -->
  <div class="section-title">핵심 요약</div>
  <div class="grid-4" style="margin-bottom:32px;">
    <div class="card">
      <div class="card-label">월 급여</div>
      <div class="card-value neutral" id="s-salary">—</div>
    </div>
    <div class="card">
      <div class="card-label">월 총 저축액</div>
      <div class="card-value" id="s-monthSave">—</div>
      <div class="progress-bar"><div class="progress-fill" id="s-saveProg" style="width:0%"></div></div>
      <div class="card-sub" id="s-saveRate">저축률 —</div>
    </div>
    <div class="card">
      <div class="card-label">현재 총 자산</div>
      <div class="card-value neutral" id="s-asset">—</div>
    </div>
    <div class="card">
      <div class="card-label">총 평가 수익</div>
      <div class="card-value" id="s-profit">—</div>
      <div class="card-sub" id="s-profitRate">수익률 —</div>
    </div>
  </div>

  <!-- ─── SECTION 2: 저축 계좌 현황 ─── -->
  <div class="section-title">계좌별 월 저축 현황</div>
  <div id="savings-grid" class="grid-3" style="margin-bottom:8px;"></div>
  <div class="actions-row">
    <button class="btn btn-primary" onclick="addSavingsAccount()">+ 저축 계좌 추가</button>
  </div>

  <!-- TOTAL -->
  <div class="total-bar">
    <div>
      <div class="tbl">월 총 저축액 합계</div>
      <div class="tbv" id="tb-monthTotal">₩0</div>
    </div>
    <div>
      <div class="tbl">연간 예상 저축</div>
      <div class="tbv" id="tb-yearTotal">₩0</div>
    </div>
    <div>
      <div class="tbl">저축률</div>
      <div class="tbv" id="tb-saveRate">—</div>
    </div>
  </div>

  <!-- ─── SECTION 3: 계좌별 주식 포트폴리오 ─── -->
  <div class="section-title">계좌별 주식 포트폴리오</div>
  <div id="portfolio-section"></div>
  <div class="actions-row">
    <button class="btn btn-ghost" onclick="addPortfolioAccount()">+ 포트폴리오 계좌 추가</button>
  </div>

  <!-- ─── SECTION 4: 적금 만기일 ─── -->
  <div class="section-title">적금 만기 일정</div>
  <div class="table-wrap">
    <table id="maturity-table">
      <thead>
        <tr>
          <th>계좌명</th>
          <th>종류</th>
          <th>원금</th>
          <th>금리 (%)</th>
          <th>가입일</th>
          <th>만기일</th>
          <th>예상 이자</th>
          <th>D-DAY</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="maturity-body">
        <tr class="empty-row"><td colspan="9">+ 버튼을 눌러 적금을 추가하세요</td></tr>
      </tbody>
    </table>
  </div>
  <div class="actions-row">
    <button class="btn btn-primary" onclick="addMaturityRow()">+ 적금 추가</button>
  </div>

</div><!-- /wrap -->

<script>
// ─────────────── STATE ───────────────
const state = {
  savings: [],        // { id, type, name, monthlyAmt, maturityDate }
  portfolios: [],     // { id, accountName, type, stocks: [{id, name, qty, avgPrice, curPrice, dividend, monthlyBuy}] }
  maturity: [],       // { id, name, type, principal, rate, startDate, endDate }
};

// Account types
const ACCOUNT_TYPES = ['ISA','CMA','비과세 연금저축','과세 연금저축','IRP','적금1','적금2','기타'];
const TYPE_CLASS = {
  'ISA':'tag-isa','CMA':'tag-cma',
  '비과세 연금저축':'tag-pension','과세 연금저축':'tag-pension',
  'IRP':'tag-irp','적금1':'tag-savings','적금2':'tag-savings','기타':''
};

// ─────────────── UTILS ───────────────
const fmtKRW = v => {
  if (!v && v !== 0) return '—';
  return '₩' + Number(v).toLocaleString('ko-KR');
};
const fmtNum = v => v ? Number(v).toLocaleString('ko-KR') : '—';
const pct = (a,b) => b ? ((a-b)/b*100).toFixed(2) : '0.00';
let idCnt = 1;
const uid = () => idCnt++;

// ─────────────── CLOCK ───────────────
function updateClock(){
  const now = new Date();
  document.getElementById('today-date').textContent =
    now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  document.getElementById('today-time').textContent =
    now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,1000);
updateClock();

// ─────────────── SAVINGS ───────────────
function addSavingsAccount(){
  const id = uid();
  state.savings.push({id, type:'ISA', name:'새 계좌', monthlyAmt:0, maturityDate:''});
  renderSavings();
  recalcAll();
  // Focus the name input of the new card after render
  setTimeout(() => {
    const el = document.querySelector(`#sc-${id} .savings-name-input`);
    if(el){ el.focus(); el.select(); }
  }, 50);
}

function renderSavings(){
  const grid = document.getElementById('savings-grid');
  if(!state.savings.length){
    grid.innerHTML = '<div style="color:var(--muted);font-size:12px;font-family:var(--mono);grid-column:1/-1;padding:8px 0">아직 저축 계좌가 없습니다</div>';
    return;
  }
  grid.innerHTML = state.savings.map(s => `
    <div class="savings-card" id="sc-${s.id}">

// ─────────────── PORTFOLIO ───────────────
// Fixed accounts always displayed (not deletable)
const FIXED_PORTFOLIO_TYPES = ['ISA','CMA','비과세 연금저축','과세 연금저축','IRP'];

function ensureFixedPortfolios(){
  FIXED_PORTFOLIO_TYPES.forEach(type => {
    const exists = state.portfolios.find(p => p.fixed && p.type === type);
    if(!exists){
      state.portfolios.unshift({
        id: uid(),
        accountName: type + ' 포트폴리오',
        type,
        fixed: true,
        stocks: []
      });
    }
  });
  // Keep fixed accounts in order at top
  state.portfolios.sort((a,b) => {
    const ai = FIXED_PORTFOLIO_TYPES.indexOf(a.fixed ? a.type : '__');
    const bi = FIXED_PORTFOLIO_TYPES.indexOf(b.fixed ? b.type : '__');
    if(ai === -1 && bi === -1) return 0;
    if(ai === -1) return 1;
    if(bi === -1) return -1;
    return ai - bi;
  });
}

function updateMaturity(id, field, value){
  const m = state.maturity.find(x=>x.id===id);
  if(!m) return;
  m[field] = ['principal','rate'].includes(field) ? Number(value) : value;
  renderMaturity();
}

function dDay(dateStr){
  if(!dateStr) return '—';
  const diff = Math.ceil((new Date(dateStr) - new Date()) / 86400000);
  return diff >= 0 ? diff : '만기';
}

function calcInterest(principal, rate, start, end){
  if(!principal || !rate || !start || !end) return 0;
  const months = Math.round((new Date(end) - new Date(start)) / (1000*60*60*24*30));
  return Math.round(principal * (rate/100) * (months/12));
}

function renderMaturity(){
  const tbody = document.getElementById('maturity-body');
  if(!state.maturity.length){
    tbody.innerHTML = '<tr class="empty-row"><td colspan="9">+ 버튼을 눌러 적금을 추가하세요</td></tr>';
    return;
  }
  tbody.innerHTML = state.maturity.map(m => {
    const interest = calcInterest(m.principal, m.rate, m.startDate, m.endDate);
    const dd = dDay(m.endDate);
    const ddLabel = dd === '만기' ? `<span class="badge badge-red">만기</span>` 
                  : dd <= 30 ? `<span class="badge badge-yellow">D-${dd}</span>` 
                  : `<span class="badge badge-blue">D-${dd}</span>`;
    return `
    <tr>
      <td><input value="${m.name}" placeholder="계좌명" oninput="updateMaturity(${m.id},'name',this.value)"></td>
      <td>
        <select onchange="updateMaturity(${m.id},'type',this.value)">
          ${['적금','예금','청약','기타'].map(t=>`<option ${m.type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </td>
      <td><input type="number" value="${m.principal||''}" placeholder="0" oninput="updateMaturity(${m.id},'principal',this.value)"></td>
      <td><input type="number" value="${m.rate||''}" placeholder="3.5" step="0.1" oninput="updateMaturity(${m.id},'rate',this.value)" style="max-width:70px;"></td>
      <td><input type="date" value="${m.startDate||''}" oninput="updateMaturity(${m.id},'startDate',this.value)"></td>
      <td><input type="date" value="${m.endDate||''}" oninput="updateMaturity(${m.id},'endDate',this.value)"></td>
      <td class="mono pos">${interest ? fmtKRW(interest) : '—'}</td>
      <td>${m.endDate ? ddLabel : '—'}</td>
      <td><button class="btn btn-danger" onclick="removeMaturity(${m.id})">✕</button></td>
    </tr>`;
  }).join('');
}

// ─────────────── RECALC ───────────────
function recalcAll(){
  const salary = Number(document.getElementById('salary').value) || 0;
  const asset  = Number(document.getElementById('totalAsset').value) || 0;
  const goal   = Number(document.getElementById('savingsGoal').value) || 0;

  // Monthly savings total
  const monthSave = state.savings.reduce((a,s)=>a+s.monthlyAmt,0);

  // Portfolio stats
  const totCost = state.portfolios.reduce((a,p)=>a+p.stocks.reduce((b,s)=>b+s.qty*s.avgPrice,0),0);
  const totVal  = state.portfolios.reduce((a,p)=>a+p.stocks.reduce((b,s)=>b+s.qty*s.curPrice,0),0);
  const totPnl  = totVal - totCost;
  const profRate = totCost ? (totPnl/totCost*100).toFixed(2) : 0;

  // Header cards
  document.getElementById('s-salary').textContent = salary ? fmtKRW(salary) : '—';
  document.getElementById('s-asset').textContent = asset ? fmtKRW(asset) : '—';

  const msEl = document.getElementById('s-monthSave');
  msEl.textContent = fmtKRW(monthSave);
  const saveRate = salary ? Math.min((monthSave/salary*100),100) : 0;
  const saveRatePct = salary ? (monthSave/salary*100).toFixed(1) : 0;
  document.getElementById('s-saveProg').style.width = saveRate + '%';
  document.getElementById('s-saveRate').textContent = `저축률 ${saveRatePct}%`;

  const profEl = document.getElementById('s-profit');
  profEl.textContent = totPnl ? (totPnl>0?'+':'')+fmtKRW(totPnl) : '—';
  profEl.className = 'card-value ' + (totPnl>0?'pos':totPnl<0?'neg':'');
  document.getElementById('s-profitRate').textContent = `수익률 ${totPnl>0?'+':''}${profRate}%`;

  // Total bar
  document.getElementById('tb-monthTotal').textContent = fmtKRW(monthSave);
  document.getElementById('tb-yearTotal').textContent = fmtKRW(monthSave*12);
  document.getElementById('tb-saveRate').textContent = salary ? saveRatePct+'%' : '—';
}

// ─────────────── LOCAL STORAGE ───────────────
const LS_KEY = 'investment_dashboard_v1';

function saveToStorage(){
  const data = {
    salary:    document.getElementById('salary').value,
    totalAsset:document.getElementById('totalAsset').value,
    savingsGoal:document.getElementById('savingsGoal').value,
    baseMonth: document.getElementById('baseMonth').value,
    savings:   state.savings,
    portfolios:state.portfolios,
    maturity:  state.maturity,
    idCnt,
  };
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e){}
  showToast('💾 저장됨');
}

function loadFromStorage(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(data.salary)     document.getElementById('salary').value     = data.salary;
    if(data.totalAsset) document.getElementById('totalAsset').value = data.totalAsset;
    if(data.savingsGoal)document.getElementById('savingsGoal').value= data.savingsGoal;
    if(data.baseMonth)  document.getElementById('baseMonth').value  = data.baseMonth;
    if(data.savings)    state.savings    = data.savings;
    if(data.portfolios) state.portfolios = data.portfolios;
    if(data.maturity)   state.maturity   = data.maturity;
    if(data.idCnt)      idCnt = data.idCnt;
    return true;
  } catch(e){ return false; }
}

// Auto-save on any state mutation — debounced
let saveTimer = null;
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToStorage, 800);
}

// Patch all mutating functions to auto-save
const _orig = {
  updateSavings, removeSavings, updateStock, removeStock, removePortfolio,
  updatePortfolioName, updatePortfolioType, addSavingsAccount, addPortfolioAccount,
  addStock, updateMaturity, removeMaturity, addMaturityRow
};
// Wrap each to call scheduleSave after
['updateSavings','removeSavings','updateStock','removeStock','removePortfolio',
 'updatePortfolioName','updatePortfolioType','addSavingsAccount','addPortfolioAccount',
 'addStock','updateMaturity','removeMaturity','addMaturityRow'].forEach(fn => {
  const orig = window[fn];
  window[fn] = function(){ orig.apply(this, arguments); scheduleSave(); };
});
// Also save on basic input changes
['salary','totalAsset','savingsGoal','baseMonth'].forEach(id => {
  document.getElementById(id).addEventListener('input', scheduleSave);
});

// ─────────────── EXPORT / IMPORT ───────────────
function exportJSON(){
  const data = {
    exportedAt: new Date().toISOString(),
    salary:    document.getElementById('salary').value,
    totalAsset:document.getElementById('totalAsset').value,
    savingsGoal:document.getElementById('savingsGoal').value,
    baseMonth: document.getElementById('baseMonth').value,
    savings:   state.savings,
    portfolios:state.portfolios,
    maturity:  state.maturity,
    idCnt,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  const date = new Date().toISOString().slice(0,10);
  a.download = `투자대시보드_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📥 파일로 내보내기 완료');
}

function importJSON(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if(data.salary)     document.getElementById('salary').value     = data.salary;
        if(data.totalAsset) document.getElementById('totalAsset').value = data.totalAsset;
        if(data.savingsGoal)document.getElementById('savingsGoal').value= data.savingsGoal;
        if(data.baseMonth)  document.getElementById('baseMonth').value  = data.baseMonth;
        if(data.savings)    state.savings    = data.savings;
        if(data.portfolios) state.portfolios = data.portfolios;
        if(data.maturity)   state.maturity   = data.maturity;
        if(data.idCnt)      idCnt = data.idCnt;
        renderAll();
        saveToStorage();
        showToast('✅ 불러오기 완료!');
      } catch(err){
        showToast('❌ 파일 형식이 올바르지 않습니다');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function clearAll(){
  if(!confirm('모든 데이터를 초기화할까요? 이 작업은 되돌릴 수 없습니다.')) return;
  localStorage.removeItem(LS_KEY);
  state.savings = []; state.portfolios = []; state.maturity = [];
  ['salary','totalAsset','savingsGoal'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('baseMonth').value = new Date().toISOString().slice(0,7);
  renderAll();
  showToast('🗑️ 초기화 완료');
}

function renderAll(){
  renderSavings();
  renderPortfolios();
  renderMaturity();
  recalcAll();
}

  if(!t){
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = `
      position:fixed; bottom:28px; right:28px; z-index:9999;
      background:#1a2e1c; border:1px solid rgba(0,230,118,0.3);
      color:#e8f5e9; font-family:'IBM Plex Mono',monospace; font-size:12px;
      padding:10px 18px; border-radius:4px; opacity:0;
      transition:opacity .25s; pointer-events:none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    `;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 2200);
}

// ─────────────── INIT ───────────────
document.getElementById('baseMonth').value = new Date().toISOString().slice(0,7);

const loaded = loadFromStorage();

if(!loaded){
  // First-time defaults
  const defaults = [
    {type:'ISA',name:'ISA 계좌',monthlyAmt:0,maturityDate:''},

    {type:'비과세 연금저축',name:'비과세 연금저축 펀드',monthlyAmt:0,maturityDate:''},
    {type:'과세 연금저축',name:'과세 연금저축 펀드',monthlyAmt:0,maturityDate:''},
    {type:'IRP',name:'IRP 계좌',monthlyAmt:0,maturityDate:''},
    {type:'적금1',name:'적금1',monthlyAmt:0,maturityDate:''},
    {type:'적금2',name:'적금2',monthlyAmt:0,maturityDate:''},
  ];
  defaults.forEach(d => { state.savings.push({id:uid(),...d}); });
}

renderAll();

</script>
